<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Financeiro - Recuperar senha</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="forgot">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="brand">
        <span class="logo" id="logo" aria-hidden="true"></span>
        <strong>Financeiro</strong>
      </div>
      <p class="auth-sub">Recuperação de senha (aprovada pelo administrador).</p>

      <form id="forgotForm" class="stack" novalidate>
        <div class="field">
          <label for="forgotEmailLocal">E-mail cadastrado</label>
          <div class="email-field">
            <input type="text" id="forgotEmailLocal" class="email-local" autocomplete="username" placeholder="você" required inputmode="email" spellcheck="false" />
            <span class="email-suffix" aria-hidden="true">@financeiro.com.br</span>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="justify-content:center">Solicitar recuperação</button>
        <p class="center hint"><a href="index.html">Voltar ao login</a></p>
      </form>

      <div id="forgotDone" class="status-card hidden" style="text-align:center">
        <div class="status-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <p id="forgotDoneMsg" class="auth-sub"></p>
        <a class="btn btn-ghost" href="index.html" style="justify-content:center">Voltar ao login</a>
      </div>
    </div>
  </div>
  <script src="js/icons.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
